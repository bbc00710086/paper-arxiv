# This is a basic workflow to help you get started with Actions

name: Run Arxiv Papers Daily

# Controls when the workflow will run
on:
  schedule:
    # 每天北京时间早上 10:30 运行一次 (UTC 是 02:30)
    - cron: '30 2 * * *'
  
  # 建议保留这个，方便你随时手动点击运行测试
  workflow_dispatch:

env:
  GITHUB_USER_NAME: bansky-cl
  GITHUB_USER_EMAIL: cxy1365@163.com

jobs:
  build:
    name: update
    runs-on: ubuntu-latest
    
    # 【必须添加】显式赋予 Action 提交代码的权限
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Set up Python Env
        uses: actions/setup-python@v4 # 升级到 v4 更稳定
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install arxiv requests matplotlib
          
      - name: Run daily arxiv 
        run: |
          # 确保脚本名称与你仓库里的文件名一致
          python daily_arxiv.py
          
      - name: Check files (Debug)
        run: |
          ls -R # 查看生成的文件夹和文件，确认路径正确
          
      - name: Push updates
        uses: github-actions-x/commit@v2.9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Github Action Automatic Update Arxiv Papers"
          # 【关键修改】使用通配符匹配所有生成的图片和各个 Topic 的 MD 文件
          files: README.md docs/arxiv-daily.json imgs/*.png *.md
          rebase: 'true'
          name: ${{ env.GITHUB_USER_NAME }}
          email: ${{ env.GITHUB_USER_EMAIL }}
